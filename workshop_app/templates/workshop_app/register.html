{% extends 'workshop_app/base.html' %}

	{% block title %}
		Register - FOSSEE Workshops
	{% endblock %}

{% block content %}

	<style type="text/css">
    	label.required::after {
    	content: "*";
    	color: red;
		}

		.errorlist {
      color: red;
    }
	</style>

	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-8">
				<div class="card">
					<div class="card-body">
						<h1 class="h4 mb-3">Coordinator Registration</h1>
						<form action="" method="post" aria-label="Registration form">
							{% csrf_token %}
							<div class="table-responsive">
								<table class="table table-bordered">
									{{ form.as_table }}
								</table>
							</div>
							<button class="btn btn-primary btn-block" type="submit">Register</button>
						</form>
						<hr>
						<div class="text-center">
							<a href="{% url 'workshop_app:login' %}">Already have an account? Sign in</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
{% endblock %}
